# Use normal screen prefix
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# Recognize additional keypresses
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# For neovim
set-option -g focus-events on
set-option -a terminal-features 'tmux-256color:RGB'

# Enable mouse
set -g mouse on
set -g set-clipboard on

# status bar hidden by default, show with keybind
set -g status off
bind b set -g status

# Don't change my windows names
set-window-option -g automatic-rename off

# Avoid too much delay when pressing ESC
set -s escape-time 10

# Terminal type and true color
set -g default-terminal "tmux-256color"
set-option -a terminal-features 'xterm-256color:RGB'
# Some scroll back
set -g history-limit 10000

# Vim style
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Bind C-l to <prefix>C-l. C-l used by vim-tmux-navigator
bind C-l send-keys 'C-l'

# Theme overrides
set -g @themepack-status-right-area-left-format ""
set -g @themepack-status-right-area-middle-format ""
set -g @themepack-status-right-area-right-format "#H"

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins/'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'basic'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'mrjones2014/smart-splits.nvim'

set -g @smart-splits_move_left_key  'C-h'
set -g @smart-splits_move_down_key  'C-j'
set -g @smart-splits_move_up_key    'C-k'
set -g @smart-splits_move_right_key 'C-l'

# TODO: C-S mapping doesn't work...
set -g @smart-splits_resize_left_key  'C-S-h'
set -g @smart-splits_resize_down_key  'C-S-j'
set -g @smart-splits_resize_up_key    'C-S-k'
set -g @smart-splits_resize_right_key 'C-S-l'

set -g @smart-splits_resize_step_size '3'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.local/share/tmux/plugins/tpm/tpm'
